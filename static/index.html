<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kenya Tax Q&amp;A — ask anything about KRA, PAYE, VAT</title>
  <meta name="description" content="Free, instant answers to Kenyan tax questions. PAYE, VAT, TOT, WHT, NSSF, SHIF, Housing Levy. Powered by Claude." />
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #111827;
      --fg: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #059669;
      --border: #1f2937;
      --user: #1e293b;
      --ai: #0f172a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { font-size: 18px; margin: 0; font-weight: 600; }
    h1 .flag { color: var(--accent); }
    header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
    }
    header a:hover { color: var(--fg); border-color: var(--accent); }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 20px 140px;
    }
    .intro {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .samples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .samples button {
      background: var(--panel);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .samples button:hover { border-color: var(--accent); }
    .msg {
      padding: 16px 18px;
      border-radius: 10px;
      margin-bottom: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user { background: var(--user); }
    .msg.ai { background: var(--ai); border: 1px solid var(--border); }
    .msg .role {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .usage {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .composer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(180deg, transparent, var(--bg) 25%);
      padding: 20px;
    }
    .composer-inner {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }
    textarea {
      flex: 1;
      background: var(--panel);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      resize: none;
      font: inherit;
      min-height: 52px;
      max-height: 160px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    button.send {
      background: var(--accent-2);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-weight: 600;
      cursor: pointer;
    }
    button.send:disabled { opacity: 0.5; cursor: not-allowed; }
    button.send:hover:not(:disabled) { background: var(--accent); }
    .disclaimer {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
    }
    .cursor::after {
      content: "▊";
      color: var(--accent);
      animation: blink 1s steps(2, start) infinite;
    }
    @keyframes blink { to { visibility: hidden; } }
  </style>
</head>
<body>
  <header>
    <h1><span class="flag">🇰🇪</span> Kenya Tax Q&amp;A</h1>
    <a href="https://github.com/" target="_blank" rel="noopener">source</a>
  </header>

  <main>
    <p class="intro">
      Ask anything about Kenyan tax — PAYE, VAT, TOT, withholding, NSSF,
      SHIF, Housing Levy, TCC, iTax deadlines. Powered by Claude.
      Not legal advice. Always verify on iTax before filing.
    </p>

    <div class="samples" id="samples">
      <button>How much PAYE do I pay on 80,000 monthly salary?</button>
      <button>Do I need to register for VAT?</button>
      <button>What is TOT and who pays it?</button>
      <button>When is the Housing Levy deadline?</button>
      <button>How do I get a TCC?</button>
    </div>

    <div id="chat"></div>
  </main>

  <form class="composer" id="form">
    <div class="composer-inner">
      <textarea
        id="q"
        placeholder="Ask a Kenya tax question — e.g. 'How do I file nil VAT?'"
        required
      ></textarea>
      <button class="send" type="submit" id="send">Ask</button>
    </div>
    <p class="disclaimer">
      Informational only. Confirm figures on itax.kra.go.ke before filing.
    </p>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const ta = document.getElementById("q");
    const send = document.getElementById("send");
    const samples = document.getElementById("samples");

    samples.addEventListener("click", (e) => {
      if (e.target.tagName === "BUTTON") {
        ta.value = e.target.textContent;
        ta.focus();
      }
    });

    ta.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    function addMsg(role, text = "") {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = `<div class="role">${role === "user" ? "You" : "Claude"}</div><div class="body"></div>`;
      div.querySelector(".body").textContent = text;
      chat.appendChild(div);
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      return div.querySelector(".body");
    }

    function addUsage(parent, u) {
      const span = document.createElement("div");
      span.className = "usage";
      const cacheMsg = u.cache_read > 0
        ? ` · cache read ${u.cache_read} (saved ~${Math.round(u.cache_read * 0.9)} tokens of cost)`
        : u.cache_write > 0 ? ` · cache written ${u.cache_write}` : "";
      span.textContent = `in: ${u.input_tokens} · out: ${u.output_tokens}${cacheMsg}`;
      parent.parentElement.appendChild(span);
    }

    async function ask(question) {
      addMsg("user", question);
      const body = addMsg("ai", "");
      body.classList.add("cursor");

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        if (!res.ok || !res.body) throw new Error("HTTP " + res.status);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        let acc = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          let idx;
          while ((idx = buf.indexOf("\n\n")) !== -1) {
            const frame = buf.slice(0, idx);
            buf = buf.slice(idx + 2);

            const evLine = frame.split("\n").find((l) => l.startsWith("event:"));
            const dataLine = frame.split("\n").find((l) => l.startsWith("data:"));
            if (!evLine || !dataLine) continue;

            const event = evLine.slice(6).trim();
            const data = JSON.parse(dataLine.slice(5).trim());

            if (event === "token") {
              acc += data.text;
              body.textContent = acc;
              window.scrollTo({ top: document.body.scrollHeight });
            } else if (event === "done") {
              body.classList.remove("cursor");
              addUsage(body, data);
            } else if (event === "error") {
              body.classList.remove("cursor");
              body.textContent = "⚠ " + data.message;
            }
          }
        }
      } catch (err) {
        body.classList.remove("cursor");
        body.textContent = "⚠ " + err.message;
      } finally {
        send.disabled = false;
        ta.disabled = false;
        ta.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = ta.value.trim();
      if (!q) return;
      ta.value = "";
      send.disabled = true;
      ta.disabled = true;
      ask(q);
    });
  </script>
</body>
</html>
